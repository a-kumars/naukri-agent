name: Daily Resume Update

# Updated workflow for cloud automation

on:
  schedule:
    # Run daily at 7 AM UTC (adjust timezone as needed)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-resume:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install

    - name: Run resume update
      env:
        NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
        NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
      run: python test_resume_upload.py